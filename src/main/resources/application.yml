spring:
  application:
    name: api
  output:
    ansi:
      enabled: ALWAYS
  jackson:
    time-zone: Asia/Bangkok
  mvc:
    format:
      date: yyyy-MM-dd
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 1m
  datasource:
    url: jdbc:mysql://203.150.106.14:3306/nutalig
    username: nutalig_user
    password: P@ssw0rd1234!
    hikari:
      minimum-idle: 5
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50

server:
  port: 8002
  shutdown: graceful
  max-http-request-header-size: 2MB
  servlet:
    context-path: /nutalig

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} |%clr(%5p) | %clr(${spring.application.name}){green} | %X{IPAddress} | %X{traceId:-} | %X{spanId:-} | %clr(${PID}){magenta} %clr(---){faint} %clr([%7.15t]){faint} | %clr(%-10.40logger{10}:%L){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}"
  level:
    org.springframework.cache: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metric
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

